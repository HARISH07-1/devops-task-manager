apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager

  template:
    metadata:
      labels:
        app: task-manager

    spec:
      containers:
      - name: task-manager

        image: harishhh07/task-manager:7

        ports:
        - containerPort: 5000

        env:
         - name: APP_NAME
           valueFrom:
             configMapKeyRef:
               name: task-manager-config
               key: APP_NAME
