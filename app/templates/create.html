<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>
</head>
<body>

<h2>Create New Task</h2>

<form method="POST">

    <label>Title</label>

    <br>

    <input
        type="text"
        name="title"
        required>

    <br><br>

    <label>Description</label>

    <br>

    <textarea
        name="description">
    </textarea>

    <br><br>

    <button type="submit">
        Create Task
    </button>

</form>

</body>
</html>
